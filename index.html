<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Camper mieten</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
background:#f8f8f8;
text-align:center;
}

/* HEADER */

header{
background:#C8AD7E;
color:white;
padding:4rem 2rem 2rem;
display:flex;
flex-direction:column;
align-items:center;
position:relative;
overflow:hidden;
}

/* leichte Struktur */

header:after{
content:"";
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
background-image:radial-gradient(rgba(255,255,255,0.15) 1px, transparent 1px);
background-size:18px 18px;
opacity:0.3;
}

header *{
position:relative;
z-index:2;
}

/* LOGO */

.logo-circle{
width:150px;
height:150px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:1.5rem;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.logo-circle img{
width:80%;
height:80%;
object-fit:contain;
}

header h1{
font-size:3.2rem;
font-weight:700;
margin:0.5rem 0;
}

header p{
font-weight:300;
font-size:1.25rem;
margin:0;
}

/* Sterne */

.stars{
margin-top:0.8rem;
font-size:1.2rem;
letter-spacing:3px;
}

/* QUOTE */

.quote{
max-width:700px;
margin:2.5rem auto 1rem;
font-size:1.3rem;
font-weight:300;
font-style:italic;
color:#333;
padding:0 1rem;
}

/* CAMPER */

.camper-container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:2rem;
padding:2rem;
}

.camper{
position:relative;
max-width:520px;
flex:1 1 320px;
overflow:hidden;
border-radius:10px;

opacity:0;
transform:translateY(60px);
transition:all .9s ease;
}

.camper.visible{
opacity:1;
transform:translateY(0);
}

.camper img{
width:100%;
display:block;
border-radius:10px;
transition:transform .6s ease;
}

.camper:hover img{
transform:scale(1.05);
}

.button{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#C8AD7E;
color:white;
padding:0.9rem 1.4rem;
border-radius:30px;
font-weight:400;
font-size:0.95rem;
transition:.3s;
}

.camper:hover .button{
background:#b9985c;
}

a{
text-decoration:none;
}

/* FOOTER */

footer{
margin:3rem 0;
font-size:0.8rem;
color:#C8AD7E;
}

/* WHATSAPP BUTTON */

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:14px 18px;
border-radius:40px;
font-size:15px;
text-decoration:none;
box-shadow:0 6px 18px rgba(0,0,0,0.25);
transition:0.3s;
}

.whatsapp:hover{
transform:scale(1.05);
}

</style>
</head>

<body>

<header>

<div class="logo-circle">
<img src="logo.png">
</div>

<h1>Miete meinen Camper</h1>
<p>Mercedes Marco Polo mieten & Abenteuer starten</p>

<div class="stars">
★★★★★
</div>

</header>


<div class="quote">
„Die schönsten Erinnerungen sammelt man auf Reisen – nicht auf dem Sofa.“
</div>


<div class="camper-container">

<a href="https://yescapa.de/campers/109345" target="_blank">

<div class="camper" data-delay="0">

<img src="Camper2.jpg">

<div class="button">
Auf Yescapa mieten
</div>

</div>

</a>


<a href="https://www.paulcamper.de/rv/150995?hireType=4&excessReductionId=161" target="_blank">

<div class="camper" data-delay="250">

<img src="Camper1.jpg">

<div class="button">
Auf PaulCamper mieten
</div>

</div>

</a>

</div>


<footer>
© 2026 Camper
</footer>


<a class="whatsapp" href="https://wa.me/49123456789" target="_blank">
WhatsApp Anfrage
</a>


<script>

const campers=document.querySelectorAll('.camper');

const observer=new IntersectionObserver((entries)=>{

entries.forEach(entry=>{

if(entry.isIntersecting){

let delay=entry.target.dataset.delay;

setTimeout(()=>{
entry.target.classList.add('visible');
},delay);

}

});

},{threshold:0.2});

campers.forEach(el=>observer.observe(el));

</script>

</body>
</html>
