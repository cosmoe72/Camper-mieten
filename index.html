<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camper mieten</title>
  <style>
    body { 
      font-family: -apple-system, sans-serif; 
      margin:0; padding:0; 
      background:#f8f8f8; 
      text-align:center;
    }
    header { 
      background:#C8AD7E; 
      color:white; 
      padding:2rem;
    }
    header h1 { 
      margin:0; 
      font-size:2rem; 
    }

    .camper {
      margin:2rem 0;
      display: inline-block;
      max-width: 90%;
    }
    .camper a {
      text-decoration: none;
      color: white;
      display: block;
    }
    .camper img {
      width: 100%;
      max-width: 500px;
      border-radius:8px;
      height: auto;
      display:block;
      margin-bottom: 0.5rem;
    }
    .camper .button {
      background: #C8AD7E;
      padding: 1rem;
      border-radius:8px;
      font-weight:bold;
      transition: 0.3s;
    }
    .camper .button:hover {
      background: #B9985C;
    }

    footer { 
      margin:2rem 0; 
      padding:1rem 0;
      font-size:0.8rem; 
      color:#C8AD7E; 
    }

    html {
      scroll-behavior: smooth;
    }
  </style>
</head>
<body>
  <header>
    <h1>Miete meinen Camper</h1>
    <p>Jetzt Mercedes Marco Polo mieten & Abenteuer starten!</p>
  </header>

  <!-- Zweites Bild jetzt links -->
  <div class="camper">
    <a href="https://www.paulcamper.de/rv/150995?hireType=4&excessReductionId=161" target="_blank">
      <img src="Camper2.jpg" alt="Camper Bild 2">
      <div class="button">Marco-Polo Camper auf Paul-Camper mieten</div>
    </a>
  </div>

  <!-- Erstes Bild jetzt rechts -->
  <div class="camper">
    <a href="https://yescapa.de/campers/109345" target="_blank">
      <img src="Camper1.jpg" alt="Camper Bild 1">
      <div class="button">Marco-Polo Camper auf Yescapa mieten</div>
    </a>
  </div>

  <footer>
    &copy; 2026 Camper-Mieten
  </footer>
</body>
</html>
