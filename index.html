<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camper mieten</title>
  <style>
    body { 
      font-family: -apple-system, sans-serif; 
      margin:0; padding:0; 
      background:#f8f8f8; 
      text-align:center;
    }

    /* HEADER */
    header { 
      background:#C8AD7E; 
      color:white; 
      padding:4rem 2rem 2rem 2rem; /* höherer Header */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Logo-Kreis mit Schatten */
    .logo-circle {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25); /* weicher Shadow */
    }

    /* Logo im Kreis perfekt zentriert */
    .logo-circle img {
      width: 90%;
      height: 90%;
      object-fit: cover; /* Inhalt zentriert, füllt Kreis */
      border-radius: 50%;
      display: block;
      margin: auto;
    }

    header h1 {
      margin:0.5rem 0 0.5rem 0;
      font-size:2.5rem;
    }
    header p {
      margin:0;
      font-size:1.25rem;
    }

    /* CAMPER CONTAINER */
    .camper-container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 2rem;
      margin: 2rem 0;
    }

    .camper {
      max-width: 500px;
      flex: 1 1 300px;
      display: inline-block;
      opacity: 0;
      transform: translateY(50px);
      transition: transform 0.8s ease-out, opacity 0.8s ease-out;
    }

    .camper.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .camper a {
      text-decoration: none;
      color: white;
      display: block;
    }

    .camper img {
      width: 100%;
      border-radius:8px;
      height: auto;
      display:block;
      margin-bottom: 0.5rem;
    }

    .camper .button {
      background: #C8AD7E;
      padding: 1rem;
      border-radius:8px;
      font-weight:bold;
      transition: 0.3s;
    }

    .camper .button:hover {
      background: #B9985C;
    }

    footer { 
      margin:2rem 0; 
      padding:1rem 0;
      font-size:0.8rem; 
      color:#C8AD7E; 
    }

    html {
      scroll-behavior: smooth;
    }
  </style>
</head>
<body>
  <!-- HEADER -->
  <header>
    <div class="logo-circle">
      <img src="logo.png" alt="Logo Camper" />
    </div>
    <h1>Miete meinen Camper</h1>
    <p>Jetzt Mercedes Marco Polo mieten & Abenteuer starten!</p>
  </header>

  <!-- CAMPER-BILDER -->
  <div class="camper-container">
    <!-- Yescapa links -->
    <div class="camper" data-delay="0">
      <a href="https://yescapa.de/campers/109345" target="_blank">
        <img src="Camper2.jpg" alt="Camper Yescapa">
        <div class="button">Marco-Polo Camper auf Yescapa mieten</div>
      </a>
    </div>

    <!-- Paul-Camper rechts -->
    <div class="camper" data-delay="200">
      <a href="https://www.paulcamper.de/rv/150995?hireType=4&excessReductionId=161" target="_blank">
        <img src="Camper1.jpg" alt="Camper Paul-Camper">
        <div class="button">Marco-Polo Camper auf Paul-Camper mieten</div>
      </a>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    &copy; 2026 Camper-Mieten
  </footer>

  <!-- ANIMATION SCRIPT -->
  <script>
    const campers = document.querySelectorAll('.camper');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if(entry.isIntersecting){
          const delay = parseInt(entry.target.getAttribute('data-delay')) || 0;
          setTimeout(() => {
            entry.target.classList.add('visible');
          }, delay);
        }
      });
    }, { threshold: 0.1 });

    campers.forEach(c => observer.observe(c));
  </script>
</body>
</html>
